name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Sync CMS images to public/images
        run: |
          mkdir -p public/images
          # Copy any images Sitebits stored in src/assets/images/ to public/images/
          # so that /images/filename paths in markdown resolve correctly
          if [ -d src/assets/images ]; then
            cp -n src/assets/images/*.{jpg,jpeg,png,gif,webp,avif,svg} public/images/ 2>/dev/null || true
          fi
          # For any photography entry where coverImage.src is empty but the body
          # contains an ![](…) image, backfill the frontmatter src field
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const dir = 'src/content/photography';
          for (const file of fs.readdirSync(dir).filter(f => f.endsWith('.md'))) {
            const fp = path.join(dir, file);
            let content = fs.readFileSync(fp, 'utf8');
            // Find empty src in frontmatter
            if (!content.match(/coverImage:\s*\n\s+src:\s*""/)) continue;
            // Find first markdown image in body
            const imgMatch = content.match(/!\[.*?\]\((.+?)\)/);
            if (!imgMatch) continue;
            const imgSrc = imgMatch[1];
            content = content.replace(/( {2}src:\s*)""\n/, `$1${imgSrc}\n`);
            fs.writeFileSync(fp, content);
            console.log(`Fixed coverImage.src in ${file} → ${imgSrc}`);
          }
          EOF
      - name: Install, build, and upload your site
        uses: withastro/action@v4
        # with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          # node-version: 24 # The specific version of Node that should be used to build your site. Defaults to 22. (optional)
          # package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)
          # build-cmd: pnpm run build # The command to run to build your site. Runs the package build script/task by default. (optional)
        # env:
          # PUBLIC_POKEAPI: 'https://pokeapi.co/api/v2' # Use single quotation marks for the variable value. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5