<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
  <defs>
    <pattern id="geo" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Diagonal cross-hatching lines -->
      <line x1="0" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="80" y1="0" x2="0" y2="80" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <!-- Corner dots -->
      <circle cx="0"  cy="0"  r="1.5" fill="rgba(255,204,85,0.12)"/>
      <circle cx="80" cy="0"  r="1.5" fill="rgba(255,204,85,0.12)"/>
      <circle cx="0"  cy="80" r="1.5" fill="rgba(255,204,85,0.12)"/>
      <circle cx="80" cy="80" r="1.5" fill="rgba(255,204,85,0.12)"/>
      <!-- Centre diamond -->
      <polygon points="40,30 50,40 40,50 30,40" fill="none" stroke="rgba(255,95,63,0.07)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="80" height="80" fill="url(#geo)"/>
</svg>
